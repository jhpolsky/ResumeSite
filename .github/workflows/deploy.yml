name: Frontend CI/CD

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "**.pdf"
      - "**.docx"
      - ".gitattributes"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        run: aws s3 sync . s3://jpolsky-resume --exclude "*" --include "index.html" --include "style.css" --include "counter.js" --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id E12TJ8IYB8OQ13 --paths "/*"
